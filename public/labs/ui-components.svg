<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fafafa"/>

  <g transform="translate(300, 200)">
    <!-- Stacked cards in isometric view -->
    <g transform="rotate(-30) skewX(15) skewY(15)">
      <!-- Card 4 (back) -->
      <g transform="translate(-24, -24)" opacity="0.3">
        <rect x="-80" y="-60" width="160" height="120" fill="none" stroke="#1a1a1a" stroke-width="1" rx="6"/>
      </g>

      <!-- Card 3 -->
      <g transform="translate(-16, -16)" opacity="0.45">
        <rect x="-80" y="-60" width="160" height="120" fill="#fff" stroke="#1a1a1a" stroke-width="1" rx="6"/>
        <line x1="-60" y1="-35" x2="-10" y2="-35" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
        <line x1="-60" y1="-20" x2="40" y2="-20" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <line x1="-60" y1="-5" x2="20" y2="-5" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Card 2 -->
      <g transform="translate(-8, -8)" opacity="0.65">
        <rect x="-80" y="-60" width="160" height="120" fill="#fff" stroke="#1a1a1a" stroke-width="1" rx="6"/>
        <line x1="-60" y1="-35" x2="0" y2="-35" stroke="#bbb" stroke-width="2" stroke-linecap="round"/>
        <line x1="-60" y1="-20" x2="50" y2="-20" stroke="#ddd" stroke-width="2" stroke-linecap="round"/>
        <line x1="-60" y1="-5" x2="30" y2="-5" stroke="#ddd" stroke-width="2" stroke-linecap="round"/>
        <line x1="-60" y1="10" x2="10" y2="10" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <!-- Small checkbox -->
        <rect x="-60" y="25" width="12" height="12" fill="none" stroke="#bbb" stroke-width="1" rx="2"/>
        <rect x="-42" y="25" width="12" height="12" fill="none" stroke="#bbb" stroke-width="1" rx="2"/>
      </g>

      <!-- Card 1 (front) -->
      <g>
        <rect x="-80" y="-60" width="160" height="120" fill="#fff" stroke="#1a1a1a" stroke-width="1.2" rx="6"/>
        <!-- Title line -->
        <line x1="-60" y1="-35" x2="-10" y2="-35" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Content lines -->
        <line x1="-60" y1="-18" x2="60" y2="-18" stroke="#d4d4d4" stroke-width="2" stroke-linecap="round"/>
        <line x1="-60" y1="-3" x2="40" y2="-3" stroke="#d4d4d4" stroke-width="2" stroke-linecap="round"/>
        <line x1="-60" y1="12" x2="50" y2="12" stroke="#e5e5e5" stroke-width="2" stroke-linecap="round"/>
        <!-- Toggle switch -->
        <rect x="-60" y="30" width="28" height="14" fill="none" stroke="#1a1a1a" stroke-width="1" rx="7"/>
        <circle cx="-39" cy="37" r="4.5" fill="#1a1a1a" opacity="0.7"/>
        <!-- Button -->
        <rect x="20" y="30" width="50" height="14" fill="none" stroke="#1a1a1a" stroke-width="1" rx="3"/>
        <line x1="32" y1="37" x2="58" y2="37" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Sun/radial element -->
    <g transform="translate(100, -50)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#1a1a1a" stroke-width="1"/>
      <circle cx="0" cy="0" r="8" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
      <!-- Rays -->
      <line x1="22" y1="-8" x2="38" y2="-16" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="24" y1="0" x2="42" y2="0" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="22" y1="8" x2="38" y2="16" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="16" y1="16" x2="28" y2="30" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
      <line x1="16" y1="-16" x2="28" y2="-30" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
    </g>
  </g>
</svg>
