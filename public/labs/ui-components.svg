<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#0a0a0a"/>

  <defs>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Grid background -->
  <g stroke="#1f1f1f" stroke-width="1">
    <line x1="100" y1="100" x2="500" y2="100"/>
    <line x1="100" y1="150" x2="500" y2="150"/>
    <line x1="100" y1="200" x2="500" y2="200"/>
    <line x1="100" y1="250" x2="500" y2="250"/>
    <line x1="100" y1="300" x2="500" y2="300"/>
    <line x1="100" y1="100" x2="100" y2="300"/>
    <line x1="200" y1="100" x2="200" y2="300"/>
    <line x1="300" y1="100" x2="300" y2="300"/>
    <line x1="400" y1="100" x2="400" y2="300"/>
    <line x1="500" y1="100" x2="500" y2="300"/>
  </g>

  <!-- Card Component -->
  <g transform="translate(300, 180)">
    <!-- Card container -->
    <rect x="-100" y="-60" width="200" height="120" fill="#111" stroke="#262626" stroke-width="2" rx="8">
      <animate attributeName="stroke" values="#262626;#38bdf8;#262626" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Card header -->
    <rect x="-90" y="-50" width="80" height="8" fill="#333" rx="2">
      <animate attributeName="width" values="80;100;80" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Card content lines -->
    <rect x="-90" y="-35" width="180" height="4" fill="#1f1f1f" rx="1">
      <animate attributeName="width" values="180;140;180" dur="3s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="-90" y="-25" width="120" height="4" fill="#262626" rx="1">
      <animate attributeName="width" values="120;160;120" dur="3s" repeatCount="indefinite" begin="0.4s"/>
    </rect>

    <!-- Button -->
    <rect x="-90" y="0" width="50" height="20" fill="url(#uiGrad)" rx="4" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </rect>

    <!-- Checkbox group -->
    <rect x="-30" y="2" width="16" height="16" fill="#171717" stroke="#38bdf8" stroke-width="1" rx="3">
      <animate attributeName="stroke-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <path d="M-25 8 L-22 11 L-18 7" stroke="#38bdf8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </path>

    <rect x="10" y="2" width="16" height="16" fill="#171717" stroke="#333" stroke-width="1" rx="3"/>

    <!-- Toggle switch -->
    <rect x="40" y="4" width="36" height="12" fill="#262626" rx="6">
      <animate attributeName="fill" values="#262626;#a855f7;#262626" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="46" cy="10" r="4" fill="#0a0a0a">
      <animate attributeName="cx" values="46;70;46" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Data table preview -->
  <g transform="translate(300, 280)">
    <rect x="-80" y="0" width="160" height="50" fill="#111" stroke="#262626" rx="4"/>

    <!-- Table header -->
    <rect x="-75" y="5" width="150" height="10" fill="#1f1f1f" rx="1"/>
    <rect x="-75" y="8" width="30" height="4" fill="#333" rx="1"/>
    <rect x="-20" y="8" width="40" height="4" fill="#333" rx="1"/>

    <!-- Table rows -->
    <rect x="-75" y="20" width="150" height="8" fill="#171717" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-75" y="32" width="150" height="8" fill="#171717" rx="1">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Tooltip floating -->
  <g transform="translate(180, 160)">
    <rect x="0" y="0" width="60" height="30" fill="#171717" stroke="#38bdf8" stroke-width="1" rx="4" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 10; 0 0; 0 10" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="10" width="40" height="4" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 10; 0 0; 0 10" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Target element -->
    <rect x="10" y="50" width="40" height="20" fill="#262626" rx="2"/>
  </g>

  <!-- Select/Dropdown -->
  <g transform="translate(420, 160)">
    <rect x="0" y="0" width="80" height="30" fill="#171717" stroke="#a855f7" stroke-width="1" rx="4">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="12" width="50" height="6" fill="#a855f7" opacity="0.6" rx="1"/>
    <path d="M65 12 L70 18 L75 12" stroke="#a855f7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Dropdown options -->
    <rect x="0" y="35" width="80" height="50" fill="#111" stroke="#262626" rx="4" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="10" y="45" width="60" height="4" fill="#333" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="10" y="55" width="50" height="4" fill="#262626" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="10" y="65" width="55" height="4" fill="#262626" rx="1" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
  </g>

  <!-- Decorative dots -->
  <g fill="#a855f7" opacity="0.2">
    <circle cx="120" cy="120" r="2">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="280" r="3">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
</svg>
