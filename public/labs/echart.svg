<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" />

  <g transform="translate(300, 200)">
    <!-- Diagonal data lines pattern - rain/stream effect -->

    <!-- Dense group top-left (dark) -->
    <line x1="-180" y1="-100" x2="-120" y2="-40" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-160" y1="-110" x2="-95" y2="-45" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-140" y1="-105" x2="-80" y2="-40" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
    <line x1="-120" y1="-115" x2="-55" y2="-50" stroke="#1a1a1a" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="-100" y1="-110" x2="-40" y2="-50" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
    <line x1="-80" y1="-120" x2="-15" y2="-55" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-60" y1="-115" x2="5" y2="-50" stroke="#1a1a1a" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-40" y1="-110" x2="25" y2="-45" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>

    <!-- Mid group (medium) -->
    <line x1="-20" y1="-105" x2="55" y2="-30" stroke="#666" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="0" y1="-100" x2="70" y2="-30" stroke="#888" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="20" y1="-105" x2="95" y2="-30" stroke="#666" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="40" y1="-100" x2="110" y2="-30" stroke="#888" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="60" y1="-95" x2="130" y2="-25" stroke="#999" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="80" y1="-100" x2="145" y2="-35" stroke="#aaa" stroke-width="0.6" stroke-linecap="round"/>

    <!-- Light group right (fading) -->
    <line x1="100" y1="-90" x2="160" y2="-30" stroke="#bbb" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="120" y1="-85" x2="175" y2="-20" stroke="#ccc" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="140" y1="-80" x2="190" y2="-30" stroke="#d4d4d4" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="155" y1="-75" x2="200" y2="-20" stroke="#ddd" stroke-width="0.4" stroke-linecap="round"/>

    <!-- Lower scattered lines -->
    <line x1="-60" y1="-20" x2="10" y2="50" stroke="#999" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-30" y1="-10" x2="40" y2="60" stroke="#aaa" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="0" y1="-5" x2="65" y2="55" stroke="#bbb" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="30" y1="0" x2="90" y2="60" stroke="#ccc" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="60" y1="5" x2="115" y2="55" stroke="#d4d4d4" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="90" y1="10" x2="140" y2="60" stroke="#ddd" stroke-width="0.4" stroke-linecap="round"/>

    <!-- Bottom sparse -->
    <line x1="-200" y1="80" x2="-150" y2="130" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="-170" y1="90" x2="-130" y2="130" stroke="#999" stroke-width="0.5" stroke-linecap="round"/>

    <!-- Small label hint -->
    <text x="80" y="-100" fill="#bbb" font-family="monospace" font-size="7" opacity="0.5">scatter</text>
  </g>
</svg>
