<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#0a0a0a"/>

  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Grid background -->
  <g stroke="#1f1f1f" stroke-width="1">
    <line x1="100" y1="100" x2="500" y2="100"/>
    <line x1="100" y1="150" x2="500" y2="150"/>
    <line x1="100" y1="200" x2="500" y2="200"/>
    <line x1="100" y1="250" x2="500" y2="250"/>
    <line x1="100" y1="300" x2="500" y2="300"/>
    <line x1="100" y1="100" x2="100" y2="300"/>
    <line x1="200" y1="100" x2="200" y2="300"/>
    <line x1="300" y1="100" x2="300" y2="300"/>
    <line x1="400" y1="100" x2="400" y2="300"/>
    <line x1="500" y1="100" x2="500" y2="300"/>
  </g>

  <!-- Main Chart: Mixed Bar + Line -->
  <g transform="translate(300, 200)">
    <!-- Bars Group -->
    <g transform="translate(-140, 50)">
      <!-- Bar 1 -->
      <rect x="0" y="0" width="25" height="0" fill="url(#barGrad)" rx="2">
        <animate attributeName="height" values="0;80;0;60;0;100;0" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="0;-80;0;-60;0;-100;0" dur="8s" repeatCount="indefinite"/>
      </rect>

      <!-- Bar 2 -->
      <rect x="35" y="0" width="25" height="0" fill="url(#barGrad2)" rx="2">
        <animate attributeName="height" values="0;60;0;100;0;80;0" dur="8s" repeatCount="indefinite" begin="0.2s"/>
        <animate attributeName="y" values="0;-60;0;-100;0;-80;0" dur="8s" repeatCount="indefinite" begin="0.2s"/>
      </rect>

      <!-- Bar 3 -->
      <rect x="70" y="0" width="25" height="0" fill="url(#barGrad)" rx="2">
        <animate attributeName="height" values="0;100;0;70;0;90;0" dur="8s" repeatCount="indefinite" begin="0.4s"/>
        <animate attributeName="y" values="0;-100;0;-70;0;-90;0" dur="8s" repeatCount="indefinite" begin="0.4s"/>
      </rect>

      <!-- Bar 4 -->
      <rect x="105" y="0" width="25" height="0" fill="url(#barGrad2)" rx="2">
        <animate attributeName="height" values="0;70;0;90;0;70;0" dur="8s" repeatCount="indefinite" begin="0.6s"/>
        <animate attributeName="y" values="0;-70;0;-90;0;-70;0" dur="8s" repeatCount="indefinite" begin="0.6s"/>
      </rect>

      <!-- Bar 5 -->
      <rect x="140" y="0" width="25" height="0" fill="url(#barGrad)" rx="2">
        <animate attributeName="height" values="0;90;0;80;0;100;0" dur="8s" repeatCount="indefinite" begin="0.8s"/>
        <animate attributeName="y" values="0;-90;0;-80;0;-100;0" dur="8s" repeatCount="indefinite" begin="0.8s"/>
      </rect>

      <!-- Bar 6 -->
      <rect x="175" y="0" width="25" height="0" fill="url(#barGrad2)" rx="2">
        <animate attributeName="height" values="0;50;0;100;0;60;0" dur="8s" repeatCount="indefinite" begin="1s"/>
        <animate attributeName="y" values="0;-50;0;-100;0;-60;0" dur="8s" repeatCount="indefinite" begin="1s"/>
      </rect>

      <!-- Bar 7 -->
      <rect x="210" y="0" width="25" height="0" fill="url(#barGrad)" rx="2">
        <animate attributeName="height" values="0;100;0;60;0;80;0" dur="8s" repeatCount="indefinite" begin="1.2s"/>
        <animate attributeName="y" values="0;-100;0;-60;0;-80;0" dur="8s" repeatCount="indefinite" begin="1.2s"/>
      </rect>
    </g>

    <!-- Line Chart Overlay -->
    <path d="M-120 -60 L-85 -40 L-50 -70 L-15 -30 L20 -50 L55 -20 L90 -40" fill="none" stroke="#f472b6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="d" values="M-120 -40 L-85 -40 L-50 -40 L-15 -40 L20 -40 L55 -40 L90 -40;
        M-120 -60 L-85 -40 L-50 -70 L-15 -30 L20 -50 L55 -20 L90 -40;
        M-120 -50 L-85 -70 L-50 -50 L-15 -60 L20 -40 L55 -50 L90 -60;
        M-120 -60 L-85 -40 L-50 -70 L-15 -30 L20 -50 L55 -20 L90 -40" dur="8s" repeatCount="indefinite"/>
    </path>

    <!-- Line Data Points -->
    <g fill="#f472b6">
      <circle cx="-120" cy="-60" r="4">
        <animate attributeName="cy" values="-40;-60;-50;-60" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-85" cy="-40" r="4">
        <animate attributeName="cy" values="-40;-40;-70;-40" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-50" cy="-70" r="4">
        <animate attributeName="cy" values="-40;-70;-50;-70" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-15" cy="-30" r="4">
        <animate attributeName="cy" values="-40;-30;-60;-30" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="-50" r="4">
        <animate attributeName="cy" values="-40;-50;-40;-50" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="-20" r="4">
        <animate attributeName="cy" values="-40;-20;-50;-20" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="90" cy="-40" r="4">
        <animate attributeName="cy" values="-40;-40;-60;-40" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Pie Chart (mini) top right -->
    <g transform="translate(120, -80)">
      <!-- Donut/Pie segments -->
      <path d="M0 0 L0 -30 A30 30 0 0 1 25.98 -15 Z" fill="#38bdf8" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" values="0;0;90;0" dur="6s" repeatCount="indefinite"/>
      </path>
      <path d="M0 0 L25.98 -15 A30 30 0 0 1 25.98 15 Z" fill="#a855f7" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" values="0;0;90;0" dur="6s" repeatCount="indefinite"/>
      </path>
      <path d="M0 0 L25.98 15 A30 30 0 0 1 0 30 Z" fill="#f472b6" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" values="0;0;90;0" dur="6s" repeatCount="indefinite"/>
      </path>
      <path d="M0 0 L0 30 A30 30 0 0 1 0 -30 Z" fill="#22d3ee" opacity="0.8">
        <animateTransform attributeName="transform" type="rotate" values="0;0;90;0" dur="6s" repeatCount="indefinite"/>
      </path>
      <!-- Center hole for donut -->
      <circle cx="0" cy="0" r="15" fill="#0a0a0a"/>
      <!-- Center text -->
      <text x="0" y="3" text-anchor="middle" fill="#38bdf8" font-family="monospace" font-size="8">75%</text>
    </g>

    <!-- Radar/Gauge bottom left -->
    <g transform="translate(-120, 60)">
      <!-- Gauge background arc -->
      <path d="M-40 0 A40 40 0 0 1 40 0" fill="none" stroke="#262626" stroke-width="8" stroke-linecap="round"/>
      <!-- Gauge value arc -->
      <path d="M-40 0 A40 40 0 0 1 40 0" fill="none" stroke="url(#pieGrad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="125" stroke-dashoffset="30">
        <animate attributeName="stroke-dashoffset" values="125;30;125" dur="3s" repeatCount="indefinite"/>
      </path>
      <!-- Gauge needle -->
      <line x1="0" y1="0" x2="0" y2="-35" stroke="#38bdf8" stroke-width="2" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="-90;90;-90" dur="3s" repeatCount="indefinite"/>
      </line>
      <circle cx="0" cy="0" r="4" fill="#38bdf8"/>
    </g>

    <!-- Scatter points -->
    <g fill="#f472b6" opacity="0.6">
      <circle cx="50" cy="60" r="3"/>
      <circle cx="80" cy="40" r="4"/>
      <circle cx="110" cy="70" r="2"/>
      <circle cx="140" cy="50" r="5"/>
      <circle cx="60" cy="80" r="3"/>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(480, 120)">
    <rect x="0" y="0" width="8" height="8" fill="#38bdf8" rx="1"/>
    <text x="12" y="7" fill="#666" font-family="monospace" font-size="8">Bar</text>
    <rect x="0" y="15" width="8" height="8" fill="#a855f7" rx="1"/>
    <text x="12" y="22" fill="#666" font-family="monospace" font-size="8">Series</text>
    <rect x="0" y="30" width="8" height="8" fill="#f472b6" rx="1"/>
    <text x="12" y="37" fill="#666" font-family="monospace" font-size="8">Line</text>
  </g>

  <!-- Axis Labels -->
  <g fill="#666" font-family="monospace" font-size="8">
    <text x="160" y="320" text-anchor="middle">MON</text>
    <text x="220" y="320" text-anchor="middle">TUE</text>
    <text x="280" y="320" text-anchor="middle">WED</text>
    <text x="340" y="320" text-anchor="middle">THU</text>
    <text x="400" y="320" text-anchor="middle">FRI</text>
    <text x="460" y="320" text-anchor="middle">SAT</text>
  </g>

  <!-- Decorative dots -->
  <g fill="#a855f7" opacity="0.2">
    <circle cx="120" cy="80" r="2">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="280" r="3">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite" begin="3s"/>
    </circle>
  </g>
</svg>
