<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#0a0a0a"/>

  <defs>
    <linearGradient id="cssGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cssGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Grid background -->
  <g stroke="#1f1f1f" stroke-width="1">
    <line x1="100" y1="100" x2="500" y2="100"/>
    <line x1="100" y1="150" x2="500" y2="150"/>
    <line x1="100" y1="200" x2="500" y2="200"/>
    <line x1="100" y1="250" x2="500" y2="250"/>
    <line x1="100" y1="300" x2="500" y2="300"/>
    <line x1="100" y1="100" x2="100" y2="300"/>
    <line x1="200" y1="100" x2="200" y2="300"/>
    <line x1="300" y1="100" x2="300" y2="300"/>
    <line x1="400" y1="100" x2="400" y2="300"/>
    <line x1="500" y1="100" x2="500" y2="300"/>
  </g>

  <!-- CSS Container Queries Visual -->
  <g transform="translate(300, 200)">
    <!-- Container -->
    <rect x="-80" y="-60" width="160" height="120" fill="#111" stroke="#262626" stroke-width="2" rx="4">
      <animate attributeName="width" values="160;120;160;200;160" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Content that responds to container -->
    <g>
      <!-- Card layout changes based on container width -->
      <rect x="-70" y="-50" width="60" height="100" fill="url(#cssGrad)" opacity="0.2" rx="2">
        <animate attributeName="width" values="60;50;60;80;60" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-70;-60;-70;-90;-70" dur="6s" repeatCount="indefinite"/>
      </rect>

      <rect x="-70" y="-50" width="60" height="100" fill="none" stroke="url(#cssGrad)" stroke-width="1" rx="2">
        <animate attributeName="width" values="60;50;60;80;60" dur="6s" repeatCount="indefinite"/>
        <animate attributeName="x" values="-70;-60;-70;-90;-70" dur="6s" repeatCount="indefinite"/>
      </rect>

      <!-- Text content -->
      <rect x="-60" y="-40" width="40" height="6" fill="#38bdf8" opacity="0.8" rx="1">
        <animate attributeName="width" values="40;30;40;60;40" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="-60" y="-28" width="50" height="4" fill="#333" rx="1">
        <animate attributeName="width" values="50;40;50;70;50" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="-60" y="-20" width="30" height="4" fill="#262626" rx="1">
        <animate attributeName="width" values="30;25;30;40;30" dur="6s" repeatCount="indefinite"/>
      </rect>

      <!-- Secondary element that shows/hides -->
      <rect x="0" y="-50" width="60" height="100" fill="url(#cssGrad2)" opacity="0" rx="2">
        <animate attributeName="opacity" values="0;0;0;0.2;0" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="0" y="-50" width="60" height="100" fill="none" stroke="url(#cssGrad2)" stroke-width="1" opacity="0" rx="2">
        <animate attributeName="opacity" values="0;0;0;1;0" dur="6s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- CSS Text label -->
  <g fill="#38bdf8" font-family="monospace" font-size="10" opacity="0.6">
    <text x="300" y="280" text-anchor="middle">@container (min-width: 400px)</text>
  </g>

  <!-- Has() selector visual -->
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="80" height="100" fill="#171717" stroke="#333" rx="4">
      <animate attributeName="stroke" values="#333;#a855f7;#333" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="25" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">:has()</text>
    <circle cx="40" cy="55" r="8" fill="#a855f7" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Anchor positioning visual -->
  <g transform="translate(450, 150)">
    <rect x="0" y="0" width="80" height="100" fill="#171717" stroke="#333" rx="4">
      <animate attributeName="stroke" values="#333;#38bdf8;#333" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <text x="40" y="25" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">anchor()</text>
    <rect x="30" y="50" width="20" height="20" fill="#38bdf8" opacity="0.5" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="1s"/>
      <animateTransform attributeName="transform" type="translate" values="0 0; 5 0; 0 0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
  </g>

  <!-- Decorative dots -->
  <g fill="#a855f7" opacity="0.2">
    <circle cx="120" cy="320" r="2">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="480" cy="80" r="3">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
</svg>
