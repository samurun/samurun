<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#0a0a0a"/>
  
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <path d="M100 200 H500" stroke="#262626" stroke-width="2" stroke-dasharray="8 8"/>

  <rect x="225" y="150" width="150" height="100" rx="8" fill="none" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </rect>

  <g transform="translate(100, 200)">
    <g id="cube">
      <rect x="-10" y="-10" width="20" height="20" rx="4" fill="#404040" stroke="#525252" stroke-width="1">
        <animate attributeName="fill" values="#404040;#38bdf8;#404040" dur="4s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="stroke" values="#525252;#38bdf8;#525252" dur="4s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="width" values="20;25;20" dur="4s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="height" values="20;25;20" dur="4s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="x" values="-10;-12.5;-10" dur="4s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="y" values="-10;-12.5;-10" dur="4s" repeatCount="indefinite" begin="0s"/>
      </rect>
    </g>
    
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="-100 200" 
      to="700 200" 
      dur="4s" 
      repeatCount="indefinite"
    />
  </g>

  <g transform="translate(100, 200)">
     <use href="#cube" x="0" y="0">
       <animate attributeName="fill" values="#404040;#38bdf8;#404040" dur="4s" repeatCount="indefinite" begin="1s"/>
       </use>
     <animateTransform attributeName="transform" type="translate" from="-250 200" to="550 200" dur="4s" repeatCount="indefinite" begin="1s"/>
  </g>
    <g transform="translate(100, 200)">
     <use href="#cube" x="0" y="0">
       <animate attributeName="fill" values="#404040;#38bdf8;#404040" dur="4s" repeatCount="indefinite" begin="2s"/>
     </use>
     <animateTransform attributeName="transform" type="translate" from="-400 200" to="400 200" dur="4s" repeatCount="indefinite" begin="2s"/>
  </g>
</svg>
