<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fafafa"/>

  <g transform="translate(300, 200)">
    <!-- Isometric scrollable list -->
    <g transform="rotate(-30) skewX(15) skewY(15)">
      <!-- Visible viewport frame -->
      <rect x="-60" y="-80" width="140" height="160" fill="#fff" stroke="#1a1a1a" stroke-width="1.2" rx="4"/>

      <!-- List items inside viewport -->
      <!-- Item 1 -->
      <rect x="-50" y="-70" width="120" height="22" fill="none" stroke="#d4d4d4" stroke-width="0.8" rx="2"/>
      <line x1="-40" y1="-59" x2="-10" y2="-59" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="-59" x2="50" y2="-59" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Item 2 -->
      <rect x="-50" y="-42" width="120" height="22" fill="none" stroke="#d4d4d4" stroke-width="0.8" rx="2"/>
      <line x1="-40" y1="-31" x2="-15" y2="-31" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="-31" x2="40" y2="-31" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Item 3 (highlighted/active) -->
      <rect x="-50" y="-14" width="120" height="22" fill="#f0f0f0" stroke="#1a1a1a" stroke-width="1" rx="2"/>
      <line x1="-40" y1="-3" x2="0" y2="-3" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10" y1="-3" x2="55" y2="-3" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Item 4 -->
      <rect x="-50" y="14" width="120" height="22" fill="none" stroke="#d4d4d4" stroke-width="0.8" rx="2"/>
      <line x1="-40" y1="25" x2="-5" y2="25" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="5" y1="25" x2="45" y2="25" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Item 5 -->
      <rect x="-50" y="42" width="120" height="22" fill="none" stroke="#d4d4d4" stroke-width="0.8" rx="2"/>
      <line x1="-40" y1="53" x2="-10" y2="53" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="53" x2="55" y2="53" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Scrollbar -->
      <rect x="75" y="-70" width="4" height="140" fill="#e5e5e5" rx="2"/>
      <rect x="75" y="-40" width="4" height="40" fill="#1a1a1a" opacity="0.4" rx="2"/>
    </g>

    <!-- Ghost items above (not rendered - dashed) -->
    <g transform="rotate(-30) skewX(15) skewY(15)" opacity="0.2">
      <rect x="-50" y="-120" width="120" height="22" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" rx="2"/>
      <rect x="-50" y="-148" width="120" height="22" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" rx="2"/>
    </g>

    <!-- Ghost items below (not rendered - dashed) -->
    <g transform="rotate(-30) skewX(15) skewY(15)" opacity="0.2">
      <rect x="-50" y="100" width="120" height="22" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" rx="2"/>
      <rect x="-50" y="128" width="120" height="22" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" rx="2"/>
      <rect x="-50" y="156" width="120" height="22" fill="none" stroke="#999" stroke-width="0.5" stroke-dasharray="4 3" rx="2"/>
    </g>
  </g>
</svg>
